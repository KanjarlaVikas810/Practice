name: Workflow Practice 3

on: 
  push:
    branches:
      - main
  workflow_dispatch:
    branches:
      - main

jobs:
  say-hello:
    runs-on: ubuntu-Latest
    steps:
      - name: Say Hello
        run: echo "Hello"
    
  say-world:
    runs-on: ubuntu-Latest
    steps:
      - name: Say World
        run: echo "World"