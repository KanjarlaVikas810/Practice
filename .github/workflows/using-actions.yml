name: Using Actions

on: 
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: using-actions/react-app
    steps:
      - name: Checkout out
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: npm ci
        #working-directory: using-actions/react-app ,  not needed as we have set the default working directory for all run steps in this job
      - name: Run tests
        run: npm test
        #working-directory: using-actions/react-app



    #checkout the code
    #install dependencies
    #executr automated tests
    
